<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Enhanced Index</title>
    <style>
        /* Custom cursor styles */
        body {
            cursor: url('custom-cursor.cur'), auto;
        }
        
        /* Responsive logo */
        #logo {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
        }
        
        /* Animations */
        .fade-in { animation: fadeIn 1s forwards; }
        .float { animation: float 2s infinite; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes float { 0% { transform: translateY(0); } 50% { transform: translateY(-10px); } 100% { transform: translateY(0); } }

        /* Responsive Design */
        @media (max-width: 768px) {
            body { font-size: 14px; }
        }
    </style>
</head>
<body>
    <header>
        <img id="logo" src="logo.png" alt="K & G Logo" class="responsive">
    </header>
    <main>
        <h1>Welcome to our site!</h1>
        <p>Your content goes here...</p>
    </main>
    <script>
        // Performance improvements with GPU acceleration
        document.addEventListener('DOMContentLoaded', function() {
            // Touch event optimization
            const elements = document.querySelectorAll('.touch-optimized');
            elements.forEach(element => {
                element.addEventListener('touchstart', function(e) {
                    // handle touch event
                });
            });
        });
    </script>
</body>
</html>
